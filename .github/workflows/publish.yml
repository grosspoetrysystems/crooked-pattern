name: publish

# Publishes on a version tag push (e.g. `git tag v0.1.3 && git push origin v0.1.3`).
on:
  push:
    tags:
      - 'v*'

# Default for all jobs: read-only. The publish job below escalates to id-token.
permissions:
  contents: read

jobs:
  # Build runs all third-party code (dependency install scripts, the build)
  # but has NO id-token, so a compromised build dependency cannot mint a
  # publish credential. Its only output is the built dist/ artifact.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
      - run: pnpm install --frozen-lockfile

      # Refuse to build/publish if the tag and the package version disagree.
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG}." >&2
            exit 1
          fi

      - run: pnpm verify
      - run: pnpm coverage

      - name: Upload built dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 1

  # Publish holds the OIDC id-token but runs no third-party code: it only
  # checks out our own source, pulls in the prebuilt dist/, and publishes.
  # A tag push pauses here for a required reviewer to approve `release`.
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: release
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      # Trusted publishing requires npm >= 11.5.1; guarantee a current npm.
      - run: npm install -g npm@latest

      - name: Download built dist
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      # Publish the main package first — the wrapper pins it as a dependency.
      # Provenance is generated automatically under OIDC; --provenance is explicit.
      # Each step is idempotent: an already-published version is skipped rather
      # than erroring, so a partial-failure re-run finishes the release.
      - name: Publish @grosspoetrysystems/crooked-pattern
        run: |
          VER="$(node -p "require('./package.json').version")"
          if npm view "@grosspoetrysystems/crooked-pattern@${VER}" version >/dev/null 2>&1; then
            echo "@grosspoetrysystems/crooked-pattern@${VER} already published — skipping."
          else
            npm publish --provenance --access public --ignore-scripts
          fi

      - name: Publish @grosspoetrysystems/crooked-pattern-mcp
        working-directory: packages/crooked-pattern-mcp
        run: |
          VER="$(node -p "require('./package.json').version")"
          if npm view "@grosspoetrysystems/crooked-pattern-mcp@${VER}" version >/dev/null 2>&1; then
            echo "@grosspoetrysystems/crooked-pattern-mcp@${VER} already published — skipping."
          else
            npm publish --provenance --access public --ignore-scripts
          fi
