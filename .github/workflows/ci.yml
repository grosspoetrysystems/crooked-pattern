name: CI

on:
  push:
    branches: [master]
  pull_request:

# Least privilege by default; no job needs write access.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - run: pnpm coverage
      # Dogfood: scan this repo with the scanner it ships. A crash or a
      # regressed supply-chain posture on our own code fails the build.
      - name: Self-scan (dogfood)
        run: |
          node dist/cli.js scan --source . --out .tempor/ci-selfscan
          echo '::group::ars self-scan report'
          cat .tempor/ci-selfscan/ars-report.md
          echo '::endgroup::'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: ars-selfscan
          path: .tempor/ci-selfscan/

  # Blocks pull requests that introduce known-vulnerable or disallowed
  # dependencies before they can be merged (supply-chain injection guard).
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: high
